      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: release-name-daytona-region-proxy
                port:
                  number: 4000
    # Wildcard host for all subdomains - routes to proxy service
    # This handles sandbox subdomains like: 3000-sandbox-id.proxy.daytona.example.com
    - host: "*.proxy.daytona.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: release-name-daytona-region-proxy
                port:
                  number: 4000
  tls:
    # Use wildcard certificate (covers proxy hostname and all subdomains)
    - hosts:
        - "proxy.daytona.example.com"
        - "*.proxy.daytona.example.com"
      secretName: proxy.daytona.example.com-tls
