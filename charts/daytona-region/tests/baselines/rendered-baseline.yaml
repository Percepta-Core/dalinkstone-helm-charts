kind: Ingress
metadata:
  name: release-name-daytona-region-proxy
  namespace: default
  labels:
    helm.sh/chart: daytona-region-0.1.0
    app.kubernetes.io/name: daytona-region
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.183.0"
