# Source: daytona-region/templates/runner-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: release-name-daytona-region-runner
  namespace: default
  labels:
    helm.sh/chart: daytona-region-0.1.0
    app.kubernetes.io/name: daytona-region
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.183.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: runner
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona-region
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: runner
      daytona.io/runner: "true"
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona-region
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: runner
        daytona.io/runner: "true"
    spec:
      nodeSelector:
        daytona-sandbox-c: "true"
      tolerations:
        - key: "sandbox"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: release-name-daytona-region-runner
      terminationGracePeriodSeconds: 30
      containers:
        # Docker installer sidecar - installs Docker on the host node
        - name: docker-installer
          image: ubuntu:22.04
          securityContext:
            privileged: true
          envFrom:
            - configMapRef:
                name: release-name-daytona-region-runner-docker-installer-config
          volumeMounts:
            - name: host-root
              mountPath: /host
              mountPropagation: Bidirectional
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting Docker and Sysbox installation on host node..."
              echo "XFS Storage Size: ${XFS_STORAGE_SIZE}"
              echo "Airgapped Mode: ${AIRGAPPED_MODE}"
              
              # Shared add_host_alias() function — used by BOTH the static hostAliases loop
              # below and the dynamicHostAliases loop. The awk-based tmp-merge writes the
              # entry into a temp file and atomically renames it onto /etc/hosts via nsenter,
              # so the host file is never half-written. Idempotent: re-running with the same
              # (ip,name) pair leaves /etc/hosts in a deduplicated state — existing entries
              # for that hostname are overwritten in place, new entries are appended exactly
              # once.
              echo "Setting up host aliases..."
              add_host_alias() {
                ip="$1"; name="$2"
                if [ -z "$ip" ] || [ -z "$name" ]; then
                  echo "[host-alias] WARN: skipping empty ip='$ip' name='$name'" >&2
                  return 0
                fi
                nsenter -t 1 -m -u -n -i sh -c "
                  awk -v ip=\"$ip\" -v name=\"$name\" '
                    BEGIN { found=0 }
                    {
                      if (\$2 == name) { print ip\" \"name; found=1 }
                      else { print }
                    }
                    END { if (!found) print ip\" \"name }
                  ' /etc/hosts > /etc/hosts.tmp && mv /etc/hosts.tmp /etc/hosts
                "
                echo "[host-alias] set $ip $name"
              }
              # Static aliases (explicit ip + hostnames in services.runner.hostAliases)
              # `squote` shell-quotes the helm-substituted values so a hostname containing
              # special characters (e.g. quotes or backslashes) cannot break the surrounding
              # shell context. add_host_alias receives the unquoted contents via positional
              # arguments and re-quotes them safely with awk -v.
              # Dynamic aliases resolved at install time via Kubernetes DNS (services.runner.dockerInstaller.dynamicHostAliases)
              # Surface the resulting host entries we care about
              nsenter -t 1 -m -u -n -i sh -c 'grep -E "registry|minio|snapshot-manager" /etc/hosts || true'
              
              # Enter the host namespace and install Docker + Sysbox
              nsenter -t 1 -m -u -n -i sh <<'EOF'
              
              # Set XFS storage size in host namespace (value injected at pod creation)
              export XFS_STORAGE_SIZE="50G"
              export AIRGAPPED_MODE="false"
              
              # Offline packages location (used in airgapped mode)
              PACKAGES_DIR="/tmp/offline-packages"
              # Function to install Docker and XFS tools (online mode)
              install_docker() {
                if command -v docker >/dev/null 2>&1 && [ -x /usr/bin/dockerd ]; then
                  echo "Docker is already installed"
                  docker version
                  
                  # Still check/install XFS tools even if Docker exists
                  if ! command -v xfs_quota >/dev/null 2>&1; then
                    echo "Installing XFS tools..."
                    if command -v apt-get >/dev/null 2>&1; then
                      apt-get update
                      apt-get install -y xfsprogs
                    elif command -v yum >/dev/null 2>&1; then
                      yum install -y xfsprogs
                    fi
                  fi
                  return 0
                fi
                
                echo "Installing Docker and XFS tools..."
                
                if command -v apt-get >/dev/null 2>&1; then
                  # Debian/Ubuntu based - download Docker CE packages directly
                  cd /tmp
                  
                  # For Ubuntu 24.04 (noble)
                  DOCKER_VERSION="27.4.1-1~ubuntu.24.04~noble"

                  apt-get update
                  apt-get install -y wget xfsprogs
                  
                  wget https://download.docker.com/linux/ubuntu/dists/noble/pool/stable/amd64/docker-ce_${DOCKER_VERSION}_amd64.deb
                  wget https://download.docker.com/linux/ubuntu/dists/noble/pool/stable/amd64/docker-ce-cli_${DOCKER_VERSION}_amd64.deb
                  #wget https://download.docker.com/linux/ubuntu/dists/noble/pool/stable/amd64/docker-buildx-plugin_0.19.3-1~ubuntu.24.04~noble_amd64.deb
                  # Install with --force-depends to skip the containerd.io dependency
                  dpkg --force-depends -i docker-ce-cli_${DOCKER_VERSION}_amd64.deb
                  dpkg --force-depends -i docker-ce_${DOCKER_VERSION}_amd64.deb

                  # AKS compatibility: AKS nodes ship moby-containerd which has a hard
                  # apt-package conflict with docker-ce, so dpkg refuses to install the
                  # daemon (CLI installs fine, daemon does not). If dockerd is missing
                  # after the deb install, fall back to the static-binary tarball.
                  # EKS/GKE/vanilla Ubuntu nodes install dockerd via the deb above and
                  # skip this block entirely.
                  if [ ! -x /usr/bin/dockerd ]; then
                    echo "dockerd not installed by deb (managed-runtime conflict?) - using static tarball"
                    curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.4.1.tgz -o /tmp/docker.tgz
                    tar xzf /tmp/docker.tgz -C /tmp
                    install -m 0755 /tmp/docker/dockerd /usr/bin/dockerd
                    install -m 0755 /tmp/docker/docker-proxy /usr/bin/docker-proxy
                    install -m 0755 /tmp/docker/docker-init /usr/bin/docker-init
                    getent group docker >/dev/null 2>&1 || groupadd docker
                    printf '%s\n' '[Unit]' 'Description=Docker Application Container Engine' 'After=network-online.target' 'Wants=network-online.target' '' '[Service]' 'Type=notify' 'ExecStart=/usr/bin/dockerd' 'ExecReload=/bin/kill -s HUP $MAINPID' 'Restart=always' 'RestartSec=2' 'LimitNOFILE=infinity' 'LimitNPROC=infinity' 'LimitCORE=infinity' 'Delegate=yes' 'KillMode=process' '' '[Install]' 'WantedBy=multi-user.target' > /etc/systemd/system/docker.service
                  fi

                  mkdir -p /etc/docker
                  systemctl daemon-reload
                  systemctl enable docker
                elif command -v yum >/dev/null 2>&1; then
                  # RHEL/CentOS based
                  yum install -y docker curl xfsprogs
                  systemctl enable docker
                fi
                
                echo "Docker and XFS tools installation completed"
                return 0
              }
              
              # Function to install Sysbox (online mode)
              install_sysbox() {
                if command -v sysbox >/dev/null 2>&1 || [ -f /usr/bin/sysbox-runc ]; then
                  echo "Sysbox is already installed"
                  return 0
                fi
                
                echo "Installing Sysbox from GitHub releases..."
                
                if command -v apt-get >/dev/null 2>&1; then
                  # Debian/Ubuntu based - install from GitHub
                  . /etc/os-release
                  
                  # Determine architecture
                  ARCH=$(uname -m)
                  if [ "$ARCH" != "x86_64" ] && [ "$ARCH" != "amd64" ]; then
                    echo "Sysbox only supports x86_64 architecture"
                    return 1
                  fi
                  
                  # Download latest Sysbox release
                  SYSBOX_VERSION="v0.6.4"
                  echo "Downloading Sysbox ${SYSBOX_VERSION}..."
                  
                  cd /tmp
                  
                  # Download the deb package
                  if curl -fsSLO "https://github.com/nestybox/sysbox/releases/download/${SYSBOX_VERSION}/sysbox-ce_0.6.4-0.linux_amd64.deb"; then
                    echo "Downloaded Sysbox package successfully"
                  else
                    echo "Failed to download Sysbox, trying alternative download..."
                    # Try without SSL verification as fallback
                    curl -kLO "https://github.com/nestybox/sysbox/releases/download/${SYSBOX_VERSION}/sysbox-ce_0.6.4-0.linux_amd64.deb" || {
                      echo "Failed to download Sysbox"
                      return 1
                    }
                  fi
                  
                  # Stop Docker before installing Sysbox
                  echo "Stopping Docker for Sysbox installation..."
                  systemctl stop docker 2>/dev/null || true
                  
                  # Install dependencies
                  apt-get update
                  apt-get install -y jq fuse rsync rclone
                  
                  # Install Sysbox
                  echo "Installing Sysbox package..."
                  dpkg -i sysbox-ce_0.6.4-0.linux_amd64.deb || {
                    echo "Installing Sysbox dependencies..."
                    apt-get install -f -y
                    dpkg -i sysbox-ce_0.6.4-0.linux_amd64.deb
                  }
                  
                  # Cleanup
                  rm -f sysbox-ce_0.6.4-0.linux_amd64.deb
                  
                elif command -v yum >/dev/null 2>&1; then
                  # RHEL/CentOS based - install from GitHub
                  SYSBOX_VERSION="v0.6.4"
                  echo "Downloading Sysbox ${SYSBOX_VERSION} for RPM..."
                  
                  cd /tmp
                  curl -fsSLO "https://github.com/nestybox/sysbox/releases/download/${SYSBOX_VERSION}/sysbox-ce-0.6.4-0.linux_amd64-rpm.tar.gz"
                  
                  tar -xzf sysbox-ce-0.6.4-0.linux_amd64-rpm.tar.gz
                  
                  # Stop Docker before installing Sysbox
                  systemctl stop docker 2>/dev/null || true
                  
                  # Install Sysbox
                  yum install -y ./sysbox-ce/*.rpm
                  
                  # Cleanup
                  rm -rf sysbox-ce-0.6.4-0.linux_amd64-rpm.tar.gz sysbox-ce/
                fi
                
                echo "Sysbox installation completed"
                return 0
              }
              
              # Function to setup XFS for Docker storage with quota support
              setup_xfs_storage() {
                echo "Setting up XFS filesystem for Docker storage..."
                
                # Check current filesystem of /var/lib/docker
                DOCKER_DIR="/var/lib/docker"
                
                # Check if already on XFS
                if [ -d "$DOCKER_DIR" ]; then
                  FS_TYPE=$(df -T "$DOCKER_DIR" | tail -1 | awk '{print $2}')
                  echo "Current filesystem for $DOCKER_DIR: $FS_TYPE"
                  
                  if [ "$FS_TYPE" = "xfs" ]; then
                    echo "✓ Already on XFS filesystem"
                    
                    # Check if quota is enabled
                    if xfs_quota -x -c 'state' "$DOCKER_DIR" 2>/dev/null | grep -q "Project quota state on"; then
                      echo "✓ XFS quotas already enabled"
                      return 0
                    else
                      echo "⚠ XFS quotas not enabled, attempting to remount..."
                      # Try to remount with quota options
                      MOUNT_POINT=$(df "$DOCKER_DIR" | tail -1 | awk '{print $6}')
                      mount -o remount,prjquota "$MOUNT_POINT" 2>/dev/null || echo "Could not enable quotas on existing mount"
                    fi
                    return 0
                  fi
                  
                  echo "⚠ $DOCKER_DIR is on $FS_TYPE, not XFS"
                  echo "Will attempt to migrate to XFS loopback..."
                fi
                
                # Stop Docker before migration
                systemctl stop docker 2>/dev/null || true
                
                # Backup existing Docker data if it exists
                if [ -d "$DOCKER_DIR" ] && [ "$(ls -A $DOCKER_DIR)" ]; then
                  echo "Backing up existing Docker data..."
                  mv "$DOCKER_DIR" "${DOCKER_DIR}.backup.$(date +%s)"
                fi
                
                # Create XFS loopback file for Docker storage
                XFS_FILE="/var/lib/docker-xfs.img"
                XFS_SIZE="${XFS_STORAGE_SIZE:-50G}"  # Default 50GB, can be configured
                
                if [ ! -f "$XFS_FILE" ]; then
                  echo "Creating XFS storage file ($XFS_SIZE)..."
                  # Create sparse file
                  truncate -s "$XFS_SIZE" "$XFS_FILE"
                  
                  # Format as XFS with project quota support
                  echo "Formatting XFS filesystem with quota support..."
                  mkfs.xfs -f -n ftype=1 "$XFS_FILE"
                fi
                
                # Create mount point
                mkdir -p "$DOCKER_DIR"
                
                # Mount XFS with project quota enabled
                echo "Mounting XFS filesystem..."
                mount -o loop,prjquota "$XFS_FILE" "$DOCKER_DIR"
                
                # Add to fstab for persistence (if not already there)
                if ! grep -q "$XFS_FILE" /etc/fstab; then
                  echo "$XFS_FILE $DOCKER_DIR xfs loop,prjquota 0 0" >> /etc/fstab
                fi
                
                # Initialize XFS quota
                echo "Initializing XFS quota system..."
                xfs_quota -x -c 'project -s -d 1' "$DOCKER_DIR" 2>/dev/null || true
                
                echo "✓ XFS storage setup completed"
                return 0
              }
              
              # Function to configure Docker to use Sysbox runtime
              configure_docker_sysbox() {
                echo "Configuring Docker to use Sysbox runtime..."
                
                mkdir -p /etc/docker
                
                # Create or update Docker daemon configuration
                if [ -f /etc/docker/daemon.json ]; then
                  # Backup existing config
                  cp /etc/docker/daemon.json /etc/docker/daemon.json.bak
                fi
                
                # Write Docker daemon config with Sysbox runtime
                # Note: Not including storage-driver to avoid conflicts with GKE systemd flags
                cat > /etc/docker/daemon.json << 'DOCKERCONFIG'
              {
                "runtimes": {
                  "sysbox-runc": {
                    "path": "/usr/bin/sysbox-runc"
                  }
                },
                "default-runtime": "sysbox-runc",
                "log-driver": "json-file",
                "log-opts": {
                  "max-size": "10m",
                  "max-file": "3"
                }
              }
              DOCKERCONFIG
                
                echo "Docker configuration updated"
                return 0
              }
              
              # Setup XFS filesystem for Docker storage with quotas
              setup_xfs_storage
              
              # Install Sysbox (before Docker, as Docker config depends on sysbox)
              install_sysbox
              
              # Install Docker
              install_docker
              
              # Configure Docker to use Sysbox
              configure_docker_sysbox
              
              # Start Sysbox services
              echo "Starting Sysbox services..."
              systemctl enable sysbox 2>/dev/null || true
              systemctl start sysbox 2>/dev/null || true
              
              # Start Docker
              echo "Starting Docker with Sysbox runtime..."
              systemctl restart docker
              
              # Verify installation
              echo "=== Verification ==="
              echo "Docker version:"
              docker version
              echo ""
              echo "Docker runtime:"
              docker info | grep -i runtime || echo "Runtime info not available"
              echo ""
              echo "Sysbox status:"
              systemctl status sysbox --no-pager -l || echo "Sysbox service status not available"
              
              EOF
              
              echo "Docker and Sysbox installer initialized. Monitoring services..."
              
              # Monitor and ensure Docker and Sysbox stay running
              while true; do
                nsenter -t 1 -m -u -n -i sh -c '
                  # Check Sysbox
                  if ! systemctl is-active --quiet sysbox 2>/dev/null; then
                    echo "Sysbox service is down, restarting..."
                    systemctl start sysbox 2>/dev/null || echo "Failed to start Sysbox"
                  fi
                  
                  # Check Docker
                  if ! systemctl is-active --quiet docker; then
                    echo "Docker service is down, restarting..."
                    systemctl start docker
                  fi
                ' || echo "Health check failed, will retry..."
                sleep 60
              done
              ln -s /host/var/lib/docker /var/lib/docker
        # Daytona daemon binary installer sidecar.
        #
        # Why this exists:
        #   The daytona-runner binary embeds the per-sandbox binaries (daemon
        #   and computer-use) under static/*. At startup it extracts them into
        #   its own container FS at /usr/local/bin/.tmp/binaries/ and uses
        #   those paths as *bind-mount sources* when it creates sandbox Docker
        #   containers via the host docker socket. Because the Docker daemon
        #   runs on the host, it resolves those bind paths against the host
        #   filesystem - where they don't exist. Docker then silently creates
        #   the missing sources as empty directories, and the sandbox fails
        #   with 'exec: "/usr/local/bin/daytona": permission denied' (you
        #   can't exec a directory).
        #
        # What this sidecar does:
        #   Run daytona-runner just long enough to extract the embedded
        #   binaries into its own FS, then copy each one (+x) to the matching
        #   path on the host via the host-root bind-mount. Stale empty
        #   directories auto-created by Docker are cleaned up first.
        - name: daytona-binary-installer
          image: "docker.io/daytonaio/daytona-runner:v0.183.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          # Minimal env to satisfy daytona-runner config validation so it
          # reaches the point of extracting its embedded binaries. These
          # values are throwaway; the runner is killed as soon as the binaries
          # are on disk and never contacts any control plane.
          env:
            - name: DAYTONA_API_URL
              value: "http://127.0.0.1"
            - name: SERVER_URL
              value: "http://127.0.0.1"
            - name: API_TOKEN
              value: "installer"
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_ENDPOINT_URL
              value: "http://127.0.0.1"
            - name: AWS_ACCESS_KEY_ID
              value: "installer"
            - name: AWS_SECRET_ACCESS_KEY
              value: "installer"
            - name: AWS_DEFAULT_BUCKET
              value: "installer"
            - name: SSH_PUBLIC_KEY
              value: "installer"
            - name: HOST_SRC_DIR
              value: "/usr/local/bin/.tmp/binaries"
            - name: BINARIES
              value: "daemon-amd64 daytona-computer-use"
            - name: EXTRACT_TIMEOUT_SEC
              value: "60"
            - name: REFRESH_INTERVAL_SEC
              value: "300"
          volumeMounts:
            - name: host-root
              mountPath: /host
              mountPropagation: Bidirectional
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              SRC_DIR=/usr/local/bin/.tmp/binaries
              DST_DIR="/host${HOST_SRC_DIR}"

              echo "[daytona-binary-installer] binaries=[${BINARIES}] target=${HOST_SRC_DIR}/ on host"

              # Docker auto-creates missing bind-mount sources as empty dirs.
              # Those stale dirs block us from later writing the binary as a
              # file at the same path. Remove any we'd overwrite.
              cleanup_stale_dirs() {
                mkdir -p "${DST_DIR}"
                for name in ${BINARIES}; do
                  if [ -d "${DST_DIR}/${name}" ] && [ ! -L "${DST_DIR}/${name}" ]; then
                    echo "[daytona-binary-installer] removing stale directory ${HOST_SRC_DIR}/${name}/ on host"
                    rm -rf "${DST_DIR}/${name}"
                  fi
                done
              }

              install_one() {
                # Atomic install: write to .new then rename, so a sandbox start
                # mid-refresh never sees a half-written or non-executable file.
                name=$1
                install -m 0755 "${SRC_DIR}/${name}" "${DST_DIR}/${name}.new" \
                  && mv -f "${DST_DIR}/${name}.new" "${DST_DIR}/${name}"
              }

              install_all() {
                for name in ${BINARIES}; do
                  if [ ! -s "${SRC_DIR}/${name}" ]; then
                    echo "[daytona-binary-installer] WARN: source ${SRC_DIR}/${name} missing, skipping"
                    continue
                  fi
                  install_one "${name}"
                  echo "[daytona-binary-installer] installed ${HOST_SRC_DIR}/${name} ($(stat -c '%s bytes' "${DST_DIR}/${name}"))"
                done
              }

              extract_binaries() {
                cd /usr/local/bin
                # Clear any partially-extracted files so the size-check below
                # only returns true once the runner has re-written them fully.
                for name in ${BINARIES}; do rm -f "${SRC_DIR}/${name}"; done

                ./daytona-runner > /tmp/runner.log 2>&1 &
                RUNNER_PID=$!

                elapsed=0
                while [ ${elapsed} -lt ${EXTRACT_TIMEOUT_SEC} ]; do
                  all_present=1
                  for name in ${BINARIES}; do
                    [ -s "${SRC_DIR}/${name}" ] || { all_present=0; break; }
                  done
                  [ ${all_present} -eq 1 ] && break
                  sleep 1
                  elapsed=$((elapsed + 1))
                done

                kill -9 ${RUNNER_PID} 2>/dev/null || true
                wait ${RUNNER_PID} 2>/dev/null || true

                for name in ${BINARIES}; do
                  if [ ! -s "${SRC_DIR}/${name}" ]; then
                    echo "[daytona-binary-installer] ERROR: ${SRC_DIR}/${name} not produced within ${EXTRACT_TIMEOUT_SEC}s. runner log:"
                    tail -n 50 /tmp/runner.log || true
                    return 1
                  fi
                done
                return 0
              }

              cleanup_stale_dirs
              until extract_binaries; do
                echo "[daytona-binary-installer] extraction failed, retrying in 10s..."
                sleep 10
              done
              install_all

              # Keep host binaries in sync with whatever version is embedded in
              # the current runner image. On a runner image bump the daemonset
              # rolls, the new sidecar re-extracts, and the host files get
              # refreshed. Also self-heals if a file is removed on the host.
              while true; do
                sleep "${REFRESH_INTERVAL_SEC}"
                cleanup_stale_dirs
                for name in ${BINARIES}; do
                  SRC_SUM=$(sha256sum "${SRC_DIR}/${name}" 2>/dev/null | awk '{print $1}')
                  DST_SUM=$(sha256sum "${DST_DIR}/${name}" 2>/dev/null | awk '{print $1}')
                  if [ -z "${DST_SUM}" ] || [ "${SRC_SUM}" != "${DST_SUM}" ]; then
                    echo "[daytona-binary-installer] refreshing ${HOST_SRC_DIR}/${name}"
                    install_one "${name}" || echo "[daytona-binary-installer] WARN: refresh install failed for ${name}"
                  fi
                done
              done
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
