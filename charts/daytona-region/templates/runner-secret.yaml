{{- /*
runner-secrets: stringData for runner pod envFrom.
  AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are GATED by services.runner.aws.credentialMode:
    static — emit values from services.runner.env.* (backward-compatible default).
    irsa   — OMIT both keys entirely; rely on the SA's eks.amazonaws.com/role-arn
             annotation to inject an IRSA web-identity token at runtime.
             EXCEPT when allowEmptyStaticKeyShim is true: emit empty-string placeholders
             to satisfy the upstream daytona-runner config validator (see
             docs/upstream-issues/runner-irsa-support.md). The AWS SDK still uses
             the IRSA token at runtime — empty strings just unblock startup.
  AWS_REGION / AWS_ENDPOINT_URL / AWS_DEFAULT_BUCKET are NEVER gated — they're
  non-secret configuration both modes require.
*/ -}}
{{- if .Values.services.runner.enabled }}
{{- $credMode := .Values.services.runner.aws.credentialMode | default "static" -}}
{{- $shim := .Values.services.runner.aws.allowEmptyStaticKeyShim | default false -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "daytona.fullname" . }}-runner-secrets
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
type: Opaque
stringData:
  DAYTONA_API_URL: {{ .Values.services.runner.env.DAYTONA_API_URL | default (required "daytonaApiUrl is required" .Values.daytonaApiUrl) | quote }}
  SERVER_URL: {{ .Values.services.runner.env.SERVER_URL | default (required "daytonaApiUrl is required" .Values.daytonaApiUrl) | quote }}
  API_TOKEN: {{ .Values.services.runner.env.API_TOKEN | default "" | quote }}
  AWS_REGION: {{ .Values.services.runner.env.AWS_REGION | default "" | quote }}
  AWS_ENDPOINT_URL: {{ .Values.services.runner.env.AWS_ENDPOINT_URL | default "" | quote }}
  {{- if eq $credMode "static" }}
  AWS_ACCESS_KEY_ID: {{ .Values.services.runner.env.AWS_ACCESS_KEY_ID | default "" | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.services.runner.env.AWS_SECRET_ACCESS_KEY | default "" | quote }}
  {{- else if $shim }}
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  {{- end }}
  AWS_DEFAULT_BUCKET: {{ .Values.services.runner.env.AWS_DEFAULT_BUCKET | default "" | quote }}
  SSH_PUBLIC_KEY: {{ .Values.services.runner.env.SSH_PUBLIC_KEY | default "" | quote }}
{{- end }}
