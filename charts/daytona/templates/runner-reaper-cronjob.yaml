{{- if and .Values.services.runner.enabled .Values.services.runnerReaper.enabled .Values.postgresql.enabled }}
{{- /*
Reaps runner rows (and their sandbox rows) ONLY for nodes that no longer exist.

Why this exists: the k8s-oss runner-manager scales runner instances only
while active DB runners < MIN_RUNNERS, and it counts initializing/unresponsive
rows as active. When a sandbox node is recycled (AKS delete-machines, scale
events, VM faults) the runner row it backed goes unresponsive forever — no
component retires it (verified against runner-manager v0.184.0-k8s-oss.1:
neither the periodic check loop nor a manager restart reaps it) — so the
floor stays satisfied and NO replacement runner is ever registered on the new
node. Deleting the dead row (plus the sandbox rows that lived on the dead
node, which nothing can ever reconcile) un-wedges the autoscaler: it creates
a fresh placeholder, registers a new runner row and pushes config to the
DaemonSet runner pod on the replacement node.

Safety model — two independent gates, BOTH must pass before a row is reaped:
  1. DB gate:  the row must have had no heartbeat for >= staleAfterMinutes.
  2. K8s gate: the pod backing the row (runner.name == placeholder pod name)
     must NOT exist in the namespace. An init container records a census of
     live (Pending/Running) pods; any stale row whose pod is still present
     is skipped and logged.
Gate 2 guarantees a healthy node whose runner is merely slow or restarting
(DaemonSet roll on chart reapply, docker-installer rerun, runner crash) is
NEVER reaped — its placeholder pod still exists — no matter how stale the
heartbeat gets. Sandboxes on live nodes are never touched. The reaper never
deletes k8s objects, pods or nodes; it only deletes DB rows for
infrastructure that is already gone. Healthy runners heartbeat every ~10s
and never even reach gate 1.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "daytona.fullname" . }}-runner-reaper
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner-reaper
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "daytona.fullname" . }}-runner-reaper
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner-reaper
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "daytona.fullname" . }}-runner-reaper
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "daytona.fullname" . }}-runner-reaper
subjects:
  - kind: ServiceAccount
    name: {{ include "daytona.fullname" . }}-runner-reaper
    namespace: {{ include "daytona.namespace" . }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "daytona.fullname" . }}-runner-reaper
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner-reaper
spec:
  schedule: {{ .Values.services.runnerReaper.schedule | default "*/2 * * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            {{- include "daytona.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: runner-reaper
        spec:
          serviceAccountName: {{ include "daytona.fullname" . }}-runner-reaper
          restartPolicy: Never
          volumes:
            - name: shared
              emptyDir: {}
          initContainers:
            # K8s gate: record which pods are actually alive right now. The
            # reaper container refuses to delete anything if this census is
            # missing or empty, so a census failure fails safe (no reaping).
            - name: pod-census
              image: "{{ .Values.services.runnerReaper.kubectlImage.registry }}/{{ .Values.services.runnerReaper.kubectlImage.repository }}:{{ .Values.services.runnerReaper.kubectlImage.tag }}"
              imagePullPolicy: {{ .Values.services.runnerReaper.kubectlImage.pullPolicy | default "IfNotPresent" }}
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  kubectl get pods -n "$NAMESPACE" \
                    --field-selector=status.phase!=Failed,status.phase!=Succeeded \
                    -o custom-columns=:metadata.name --no-headers > /shared/live-pods.txt
                  echo "Census: $(wc -l < /shared/live-pods.txt) live pods in $NAMESPACE"
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: shared
                  mountPath: /shared
              resources:
                limits:
                  cpu: 100m
                  memory: 64Mi
                requests:
                  cpu: 10m
                  memory: 32Mi
          containers:
            - name: reaper
              image: "{{ .Values.services.runnerReaper.image.registry }}/{{ .Values.services.runnerReaper.image.repository }}:{{ .Values.services.runnerReaper.image.tag }}"
              imagePullPolicy: {{ .Values.services.runnerReaper.image.pullPolicy | default "IfNotPresent" }}
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  STALE_MIN="${STALE_AFTER_MINUTES:-5}"
                  PSQL="psql -v ON_ERROR_STOP=1 -h $DB_HOST -p $DB_PORT -U $DB_USERNAME -d $DB_DATABASE"
                  if ! [ -s /shared/live-pods.txt ]; then
                    echo "ERROR: pod census missing or empty — refusing to reap anything" >&2
                    exit 1
                  fi
                  CANDIDATES=$($PSQL -tA <<SQL
                  SELECT id::text || '|' || name FROM runner
                  WHERE (state = 'unresponsive'
                         AND "lastChecked" IS NOT NULL
                         AND "lastChecked" < now() - interval '${STALE_MIN} minutes')
                     OR (state IN ('initializing', 'unresponsive')
                         AND "lastChecked" IS NULL
                         AND "updatedAt" < now() - interval '${STALE_MIN} minutes');
                  SQL
                  )
                  if [ -z "$CANDIDATES" ]; then
                    echo "No runner rows stale >= ${STALE_MIN}m. Nothing to do."
                    exit 0
                  fi
                  REAP_IDS=""
                  for line in $CANDIDATES; do
                    id="${line%%|*}"
                    name="${line#*|}"
                    case "$id" in *[!0-9a-f-]*|"") echo "SKIP malformed id: $line"; continue;; esac
                    if grep -qxF "$name" /shared/live-pods.txt; then
                      echo "SKIP $name: backing pod still exists (node alive or still initializing)"
                    else
                      echo "REAP $name: stale in DB and no backing pod — node is gone"
                      REAP_IDS="${REAP_IDS}${REAP_IDS:+,}'$id'"
                    fi
                  done
                  if [ -z "$REAP_IDS" ]; then
                    echo "All stale rows still have live pods — nothing reaped."
                    exit 0
                  fi
                  $PSQL <<SQL
                  BEGIN;
                  -- These sandboxes lived on the deleted node; the rows are
                  -- unrecoverable and the API can never reconcile them, so
                  -- remove them outright. Child rows (sandbox_fork,
                  -- sandbox_last_activity, ssh_access) follow via ON DELETE
                  -- CASCADE. ::text on both sides keeps the comparison valid
                  -- whether "runnerId" is uuid or varchar across versions.
                  DELETE FROM sandbox WHERE "runnerId"::text IN (${REAP_IDS});
                  DELETE FROM runner WHERE id::text IN (${REAP_IDS});
                  COMMIT;
                  SQL
                  echo "Reap complete"
              env:
                - name: STALE_AFTER_MINUTES
                  value: {{ .Values.services.runnerReaper.staleAfterMinutes | default 5 | quote }}
                - name: DB_HOST
                  value: {{ printf "%s-postgresql" .Release.Name | quote }}
                - name: DB_PORT
                  value: "5432"
                - name: DB_DATABASE
                  value: {{ .Values.postgresql.auth.database | default "daytona" | quote }}
                - name: DB_USERNAME
                  value: {{ .Values.postgresql.auth.username | default "user" | quote }}
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-postgresql" .Release.Name }}
                      key: password
              volumeMounts:
                - name: shared
                  mountPath: /shared
              resources:
                {{- toYaml .Values.services.runnerReaper.resources | nindent 16 }}
{{- end }}
