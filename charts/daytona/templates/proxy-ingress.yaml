{{- if .Values.services.proxy.ingress.enabled -}}
{{- $fullName := include "daytona.fullname" . -}}
{{- $svcPort := .Values.services.proxy.service.port -}}
{{- $baseDomain := .Values.baseDomain -}}
{{- $templatedBaseDomain := tpl $baseDomain $ -}}
{{- $proxyHostname := printf "proxy.%s" $templatedBaseDomain -}}
{{- /*
  Wildcard MUST be *.<baseDomain> (NOT *.proxy.<baseDomain>) because the api's
  PROXY_TEMPLATE_URL in api-deployment.yaml hardcodes sandbox preview URLs as
  https://{{PORT}}-{{sandboxId}}.<baseDomain>:443 (no .proxy. infix). Operators'
  DNS wildcards are also typically *.<baseDomain> per the README install guide.
  Upstream daytonaio/helm-charts ships with *.proxy.<baseDomain> here, which
  doesn't match either of the above — that's a known upstream bug. Sandbox-
  scope subdomains like dex/harbor/api/proxy use EXACT-HOST ingress rules and
  win nginx routing over this wildcard, so no collision.
*/ -}}
{{- $wildcardBaseDomain := printf "*.%s" $templatedBaseDomain -}}
{{- if and .Values.services.proxy.ingress.className (not (hasKey .Values.services.proxy.ingress.annotations "kubernetes.io/ingress.class")) }}
  {{- $_ := set .Values.services.proxy.ingress.annotations "kubernetes.io/ingress.class" .Values.services.proxy.ingress.className}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-proxy
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
  {{- with .Values.services.proxy.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.services.proxy.ingress.className }}
  ingressClassName: {{ .Values.services.proxy.ingress.className }}
  {{- end }}
  rules:
    # OAuth callback for sandbox preview auth on the BASE domain. The proxy
    # builds its OIDC redirect_uri as https://<baseHost>/callback where
    # baseHost is the preview host minus its first label (so
    # 3000-<sandboxId>.<base> -> <base>). The base host otherwise belongs to
    # the api ingress; this longer-prefix path routes just /callback to the
    # proxy (ingress-nginx merges same-host rules across Ingress resources,
    # longest path wins). Without it the callback 404s on the api.
    - host: {{ $templatedBaseDomain | quote }}
      http:
        paths:
          - path: /callback
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-proxy
                port:
                  number: {{ $svcPort }}
    # Proxy subdomain (exact match, e.g., proxy.daytona.example.com)
    - host: {{ $proxyHostname | quote }}
      http:
        paths:
          {{- if .Values.services.proxy.ingress.extraPaths }}
          {{- toYaml .Values.services.proxy.ingress.extraPaths | nindent 10 }}
          {{- end }}
          - path: {{ .Values.services.proxy.ingress.path | default "/" }}
            pathType: {{ .Values.services.proxy.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $fullName }}-proxy
                port:
                  number: {{ $svcPort }}
    # Wildcard host for all subdomains - routes to proxy service
    # This handles sandbox subdomains like: 3000-sandbox-id.daytona.example.com
    - host: {{ $wildcardBaseDomain | quote }}
      http:
        paths:
          {{- if .Values.services.proxy.ingress.extraPaths }}
          {{- toYaml .Values.services.proxy.ingress.extraPaths | nindent 10 }}
          {{- end }}
          - path: {{ .Values.services.proxy.ingress.path | default "/" }}
            pathType: {{ .Values.services.proxy.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $fullName }}-proxy
                port:
                  number: {{ $svcPort }}
    {{- range .Values.services.proxy.ingress.extraHosts }}
    - host: {{ tpl .name $ | quote }}
      http:
        paths:
          - path: {{ default "/" .path }}
            pathType: {{ default "ImplementationSpecific" .pathType }}
            backend:
              service:
                name: {{ $fullName }}-proxy
                port:
                  number: {{ $svcPort }}
    {{- end }}
    {{- if .Values.services.proxy.ingress.extraRules }}
    {{- toYaml .Values.services.proxy.ingress.extraRules | nindent 4 }}
    {{- end }}
  {{- if .Values.services.proxy.ingress.tls }}
  tls:
    - hosts:
        # proxy.<baseDomain> is intentionally NOT listed even though it is a
        # rule host above: the wildcard entry already matches it for
        # ingress-nginx cert selection, and Let's Encrypt rejects any order
        # that pairs an exact name with a wildcard covering it ("redundant
        # with a wildcard domain in the same request", 400 malformed) — so
        # listing it means the proxy cert never issues on ANY domain.
        - {{ $wildcardBaseDomain | quote }}
        # The bare base domain carries the /callback rule above. It MUST also
        # be listed here: with the host present in rules but absent from tls,
        # ingress-nginx binds the base-domain server to THIS ingress without a
        # certificate and serves its Fake Certificate, breaking TLS for the
        # api/dashboard host.
        - {{ $templatedBaseDomain | quote }}
      secretName: {{ .Values.services.proxy.ingress.tlsSecretName | default (printf "proxy.%s-tls" $templatedBaseDomain) }}
    {{- if .Values.services.proxy.ingress.extraTls }}
    {{- toYaml .Values.services.proxy.ingress.extraTls | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
