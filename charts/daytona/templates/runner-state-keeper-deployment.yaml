{{/*
  daytona-runner-state-keeper — workaround for upstream v0.184.x-k8s-oss bug.

  PROBLEM:
    The runner image's v2-healthcheck goroutine sends ~2 heartbeats post-boot
    (~60s apart, way slower than its configured HEALTHCHECK_INTERVAL of 10s),
    then silently stops. Container stays alive (restartCount=0), serviceHealth
    keeps reporting all-healthy on the (rare) heartbeats that do arrive, but
    lastChecked freezes and the api's check-runners cron sees lastChecked-age >
    healthCheckThresholdMs (hard-coded 60_000 in apps/api/src/sandbox/services/
    runner.service.ts:670 with NO env knob), so it flips runner.state to
    UNRESPONSIVE. From there, syncRunnerSnapshotState
    (apps/api/src/sandbox/managers/snapshot.manager.ts:304-321) deletes the
    snapshot_runner rows for any !READY runner; cleanupInactiveSnapshotsFromRunners
    then enqueues REMOVE_SNAPSHOT jobs that wipe the default snapshot image
    from the runner's local docker storage, leaving the install broken.

  WORKAROUND:
    This tiny Deployment polls postgres every 5s and resets state='ready'
    on any runner whose state='unresponsive' AND last reported serviceHealth
    has NO unhealthy entries. The runner IS healthy; the api just can't tell.
    Resetting state keeps snapshot_runner rows alive and prevents the
    REMOVE_SNAPSHOT cascade.

  WHEN TO REMOVE THIS:
    Once upstream daytonaio/daytona ships a runner image patch (k8s-oss.5+?)
    that makes the v2-healthcheck goroutine cadence reliable, OR ships an
    api patch that makes healthCheckThresholdMs env-configurable, set
    services.runnerStateKeeper.enabled=false and delete this template.

  IDEMPOTENCY:
    The UPDATE only touches rows whose state is currently 'unresponsive'
    and whose serviceHealth contains no unhealthy entries. If the runner
    actually becomes unhealthy (docker dies, etc.), serviceHealth gains an
    unhealthy entry and this watchdog stops resetting — the api's UNRESPONSIVE
    flip is then honored.
*/}}
{{- if .Values.services.runnerStateKeeper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daytona.fullname" . }}-runner-state-keeper
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner-state-keeper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "daytona.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runner-state-keeper
  template:
    metadata:
      labels:
        {{- include "daytona.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runner-state-keeper
    spec:
      restartPolicy: Always
      containers:
        - name: keeper
          image: "{{ .Values.services.runnerStateKeeper.image.registry }}/{{ .Values.services.runnerStateKeeper.image.repository }}:{{ .Values.services.runnerStateKeeper.image.tag }}"
          imagePullPolicy: {{ .Values.services.runnerStateKeeper.image.pullPolicy }}
          env:
            - name: PGHOST
              value: {{ if .Values.postgresql.enabled }}{{ include "daytona.fullname" . }}-postgresql{{ else }}{{ .Values.externalDatabase.host }}{{ end }}
            - name: PGPORT
              value: {{ if .Values.postgresql.enabled }}"5432"{{ else }}{{ .Values.externalDatabase.port | quote }}{{ end }}
            - name: PGUSER
              value: {{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.username | quote }}{{ else }}{{ .Values.externalDatabase.user | quote }}{{ end }}
            - name: PGDATABASE
              value: {{ if .Values.postgresql.enabled }}{{ .Values.postgresql.auth.database | quote }}{{ else }}{{ .Values.externalDatabase.name | quote }}{{ end }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.postgresql.enabled }}{{ include "daytona.fullname" . }}-postgresql{{ else }}{{ .Values.externalDatabase.existingSecret | default (printf "%s-external-db" (include "daytona.fullname" .)) }}{{ end }}
                  key: {{ if .Values.postgresql.enabled }}password{{ else }}database-password{{ end }}
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.services.runnerStateKeeper.pollIntervalSeconds | quote }}
          resources:
            {{- toYaml .Values.services.runnerStateKeeper.resources | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              set -u
              echo "daytona-runner-state-keeper starting; poll=${POLL_INTERVAL_SECONDS}s"
              while true; do
                psql -At -c "
                  UPDATE runner
                  SET state='ready'
                  WHERE state='unresponsive'
                    AND \"serviceHealth\" IS NOT NULL
                    AND NOT EXISTS (
                      SELECT 1 FROM jsonb_array_elements(\"serviceHealth\") elem
                      WHERE (elem->>'healthy')::boolean = false
                    )
                  RETURNING id, name, state;
                " 2>&1 | grep -v "^$" | head -5 || true
                psql -At -c "
                  UPDATE runner
                  SET \"proxyUrl\" = \"apiUrl\"
                  WHERE \"proxyUrl\" IS NULL
                    AND \"apiUrl\" IS NOT NULL
                  RETURNING id, name, \"proxyUrl\";
                " 2>&1 | grep -v "^$" | head -5 || true
                sleep "${POLL_INTERVAL_SECONDS}"
              done
{{- end }}
