{{- if and .Values.dex.enabled .Values.dex.ingress.enabled }}
{{- if and .Values.dex.ingress.tls .Values.dex.ingress.selfSigned }}
{{- /* The dex ingress references <dexHost>-tls but nothing created it in
       selfSigned mode, so ingress-nginx logged "local SSL certificate ...
       was not found" and served its Fake Certificate for the dex host. */}}
{{- $hostname := .Values.dex.ingress.hostname | default (printf "dex.%s" .Values.baseDomain) }}
{{- $templatedHostname := tpl $hostname $ }}
{{- $secretName := .Values.dex.ingress.tlsSecretName | default (printf "%s-tls" $templatedHostname) }}
{{- $ca := genCA "daytona-dex-ca" 365 }}
{{- $cert := genSignedCert $templatedHostname nil (list $templatedHostname) 365 $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: dex
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
{{- end }}
{{- end }}
