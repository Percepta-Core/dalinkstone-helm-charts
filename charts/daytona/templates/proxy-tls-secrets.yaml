{{- if .Values.services.proxy.ingress.enabled }}
{{- if .Values.services.proxy.ingress.secrets }}
{{- range .Values.services.proxy.ingress.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}
  namespace: {{ include "daytona.namespace" $ }}
  labels:
    {{- include "daytona.labels" $ | nindent 4 }}
    app.kubernetes.io/component: proxy
type: kubernetes.io/tls
data:
  tls.crt: {{ .certificate | b64enc }}
  tls.key: {{ .key | b64enc }}
---
{{- end }}
{{- end }}
{{- if and .Values.services.proxy.ingress.tls .Values.services.proxy.ingress.selfSigned }}
{{- $hostname := .Values.services.proxy.ingress.hostname | default (printf "proxy.%s" .Values.baseDomain) }}
{{- $templatedHostname := tpl $hostname $ }}
{{- /* The proxy ingress serves sandbox previews on *.<baseDomain> (one-level
       wildcard, matching PROXY_TEMPLATE_URL), NOT *.proxy.<baseDomain>. The
       cert SANs must match the ingress TLS hosts (proxy.<base> + *.<base>)
       or ingress-nginx falls back to its Fake Certificate. */}}
{{- $templatedBaseDomain := tpl .Values.baseDomain $ }}
{{- $wildcardHostname := printf "*.%s" $templatedBaseDomain }}
{{- $secretName := printf "%s-tls" $templatedHostname }}
{{- $ca := genCA "daytona-proxy-ca" 365 }}
{{- /* Includes the bare base domain: wildcards do not match the apex and the
       proxy ingress carries the base-domain /callback rule + TLS host. */}}
{{- $cert := genSignedCert $templatedHostname nil (list $templatedHostname $wildcardHostname $templatedBaseDomain) 365 $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "daytona.namespace" . }}
  labels:
    {{- include "daytona.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
{{- end }}
{{- end }}
