# Source: daytona/templates/runner-state-keeper-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-daytona-runner-state-keeper
  namespace: default
  labels:
    helm.sh/chart: daytona-0.0.23
    app.kubernetes.io/name: daytona
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.183.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: runner-state-keeper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: runner-state-keeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: runner-state-keeper
    spec:
      restartPolicy: Always
      containers:
        - name: keeper
          image: "docker.io/library/postgres:15-alpine"
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: release-name-daytona-postgresql
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: "user"
            - name: PGDATABASE
              value: "daytona"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-daytona-postgresql
                  key: password
            - name: POLL_INTERVAL_SECONDS
              value: "5"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
          command:
            - /bin/sh
            - -c
            - |
              set -u
              echo "daytona-runner-state-keeper starting; poll=${POLL_INTERVAL_SECONDS}s"
              while true; do
                psql -At -c "
                  UPDATE runner
                  SET state='ready'
                  WHERE state='unresponsive'
                    AND \"serviceHealth\" IS NOT NULL
                    AND NOT EXISTS (
                      SELECT 1 FROM jsonb_array_elements(\"serviceHealth\") elem
                      WHERE (elem->>'healthy')::boolean = false
                    )
                  RETURNING id, name, state;
                " 2>&1 | grep -v "^$" | head -5 || true
                psql -At -c "
                  UPDATE runner
                  SET \"proxyUrl\" = \"apiUrl\"
                  WHERE \"proxyUrl\" IS NULL
                    AND \"apiUrl\" IS NOT NULL
                  RETURNING id, name, \"proxyUrl\";
                " 2>&1 | grep -v "^$" | head -5 || true
                sleep "${POLL_INTERVAL_SECONDS}"
              done

