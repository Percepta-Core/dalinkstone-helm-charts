apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: release-name-daytona-dex
  labels:
    helm.sh/chart: daytona-0.0.23
    app.kubernetes.io/name: daytona
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.183.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: dex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: dex
    spec:
      initContainers:
        - name: volume-permissions
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /var/dex
              chmod 777 /var/dex
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: dex-db
              mountPath: /var/dex
      containers:
        - name: dex
          image: "docker.io/dexidp/dex:v2.42.0"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - touch /var/dex/dex.db && exec dex serve /etc/dex/config.yaml
          ports:
            - name: http
              containerPort: 5556
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/dex/config.yaml
              subPath: config.yaml
            - name: dex-db
              mountPath: /var/dex
      volumes:
        - name: config
          configMap:
            name: release-name-daytona-dex-config
        - name: dex-db
          persistentVolumeClaim:
            claimName: release-name-daytona-dex

