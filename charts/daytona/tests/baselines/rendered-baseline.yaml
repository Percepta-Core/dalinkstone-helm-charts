apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: release-name-daytona-api
  labels:
    helm.sh/chart: daytona-0.0.23
    app.kubernetes.io/name: daytona
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.183.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: daytona
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daytona
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: release-name-daytona-api
      securityContext:
        fsGroup: 2000
      containers:
        - name: api
          securityContext:
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
          image: "docker.io/daytonaio/daytona-api:v0.183.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DEFAULT_RUNNER_NAME
              value: "default-runner"
            # Application configuration
            - name: ENVIRONMENT
              value: "production"
            - name: PORT
              value: "3000"
            - name: OTEL_ENABLED
              value: "false"
            - name: SKIP_USER_EMAIL_VERIFICATION
              value: "false"
            # Database configuration
            - name: DB_HOST
              value: "release-name-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "daytona"
            - name: DB_USERNAME
              value: "user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-postgresql
                  key: password
            # Redis configuration
            # Internal Redis (subchart)
            - name: REDIS_HOST
              value: "release-name-redis-master"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              value: ""
            # Proxy Configuration
            # PROXY_DOMAIN intentionally uses bare .baseDomain (no "proxy." prefix).
            # Sandbox preview URLs are constructed as <port>-<sandboxIdSlice>.<PROXY_DOMAIN>,
            # so this keeps them at a single subdomain level (e.g. 3000-abc.<base>)
            # which matches the chart's proxy-ingress wildcard *.<baseDomain> AND the
            # *.<baseDomain> cert SAN issued by cert-manager. Upstream defaults to
            # "proxy.<baseDomain>" producing TWO-level URLs that no one-level wildcard
            # cert/DNS covers — operators hit ERR_CERT_AUTHORITY_INVALID on every preview.
            - name: PROXY_DOMAIN
              value: "daytona.example.com"
            - name: PROXY_PROTOCOL
              value: "https"
            - name: PROXY_TEMPLATE_URL
              value: "https://{{PORT}}-{{sandboxId}}.daytona.example.com:443"
            - name: PROXY_API_KEY
              value: "super_secret_key"
            # SSH Gateway Configuration
            - name: SSH_GATEWAY_HOST
              value: "ssh.daytona.example.com"
            - name: SSH_GATEWAY_COMMAND
              value: "ssh -p 2222 {{TOKEN}}@ssh.daytona.example.com"
            - name: SSH_GATEWAY_URL
              value: "ssh.daytona.example.com:2222"
            - name: SSH_GATEWAY_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: release-name-daytona-secret-ssh
                  key: SSH_PRIVATE_PUB_KEY
            - name: SSH_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: release-name-daytona-secret-ssh
                  key: API_KEY
            # Harbor Registry Configuration
            # Use Harbor configuration when enabled (overrides any values from services.api.env)
            - name: TRANSIENT_REGISTRY_URL
              value: "https://harbor.daytona.example.com"
            - name: TRANSIENT_REGISTRY_ADMIN
              value: "admin"
            - name: TRANSIENT_REGISTRY_PASSWORD
              value: "Harbor12345"
            - name: TRANSIENT_REGISTRY_PROJECT_ID
              value: "library"
            - name: INTERNAL_REGISTRY_URL
              value: "https://harbor.daytona.example.com"
            - name: INTERNAL_REGISTRY_ADMIN
              value: "admin"
            - name: INTERNAL_REGISTRY_PASSWORD
              value: "Harbor12345"
            - name: INTERNAL_REGISTRY_PROJECT_ID
              value: "library"
            # OIDC Configuration
            # Dex is enabled - use Dex configuration
            - name: OIDC_CLIENT_ID
              value: "daytona"
            - name: OIDC_ISSUER_BASE_URL
              value: "https://dex.daytona.example.com/dex"
            - name: PUBLIC_OIDC_DOMAIN
              value: "https://dex.daytona.example.com/dex"
            - name: OIDC_AUDIENCE
              value: "daytona"
            # Dashboard Configuration
            - name: DASHBOARD_URL
              value: "https://daytona.example.com/dashboard"
            - name: DASHBOARD_BASE_API_URL
              value: "https://daytona.example.com"
            # S3 Configuration (MinIO)
            - name: S3_ENDPOINT
              value: ""
            - name: S3_STS_ENDPOINT
              value: ""
            - name: S3_REGION
              value: ""
            - name: S3_ACCESS_KEY
              value: ""
            - name: S3_SECRET_KEY
              value: ""
            - name: S3_DEFAULT_BUCKET
              value: ""
            - name: S3_ACCOUNT_ID
              value: ""
            - name: S3_ROLE_NAME
              value: ""
            # SMTP Configuration
            - name: SMTP_HOST
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: ""
            - name: SMTP_PASSWORD
              value: ""
            - name: SMTP_SECURE
              value: "false"
            - name: SMTP_EMAIL_FROM
              value: "noreply@mail.daytona.io"
            # APP Configuration
            - name: DEFAULT_SNAPSHOT_IMAGE_NAME
              value: "daytonaio/sandbox:0.8.0"
            - name: DEFAULT_SNAPSHOT_NAME
              value: "default-snapshot"
            - name: DEFAULT_RUNNER_DOMAIN
              value: ""
            # Encryption configuration
            - name: ENCRYPTION_KEY
              value: "CHANGE_ME_32_CHARACTER_SECRET_K!"
            - name: ENCRYPTION_SALT
              value: "CHANGE_ME_RANDOM_SALT_VALUE"
            - name: RUNNER_MANAGER_API_KEY
              value: "runner_manager_secret_key"
            - name: DEFAULT_RUNNER_API_KEY
              value: "secret_api_token"
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var-run
          emptyDir: {}

