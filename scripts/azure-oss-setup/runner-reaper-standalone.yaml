# Daytona runner-reaper — standalone version for existing installs.
#
# Reaps runner rows (and their sandbox rows) ONLY for nodes that no longer
# exist, so the runner-manager's autoscaler can register a replacement.
#
# Why: when a sandbox node is recycled (AKS delete-machines, scale events, VM
# faults) the runner row it backed goes unresponsive forever; the manager
# counts it toward MIN_RUNNERS and never re-pushes credentials to the new
# pod, so runners stay broken until someone intervenes. This job deletes the
# dead row plus the sandbox rows that lived on the dead node (nothing can
# ever reconcile those), which lets the manager register a fresh runner
# automatically.
#
# Safety model — two independent gates, BOTH must pass before a row is reaped:
#   1. DB gate:  no heartbeat for >= STALE_AFTER_MINUTES.
#   2. K8s gate: the pod backing the row (runner.name == placeholder pod
#      name) must NOT exist. An init container records a census of live
#      (Pending/Running) pods; any stale row whose pod still exists is
#      skipped. So a healthy node whose runner is merely slow or restarting
#      (chart reapply rolling the DaemonSet, docker-installer rerun) is NEVER
#      reaped and its sandboxes are never touched. The reaper never deletes
#      k8s objects, pods or nodes — only DB rows for infra already gone.
#      Healthy runners heartbeat every ~10s and never even reach gate 1.
#
# EDIT THE VALUES MARKED "EDIT ME" to match your install, then:
#   kubectl apply -f runner-reaper-standalone.yaml
#
# NOTE: named "-manual" so it won't collide if you later upgrade to a chart
# version that ships this built in — delete this one after that upgrade:
#   kubectl -n <namespace> delete cronjob,sa,role,rolebinding -l app.kubernetes.io/component=runner-reaper-manual
apiVersion: v1
kind: ServiceAccount
metadata:
  name: daytona-runner-reaper-manual
  namespace: default # EDIT ME: namespace your Daytona release is installed in
  labels:
    app.kubernetes.io/name: daytona
    app.kubernetes.io/component: runner-reaper-manual
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: daytona-runner-reaper-manual
  namespace: default # EDIT ME: namespace your Daytona release is installed in
  labels:
    app.kubernetes.io/name: daytona
    app.kubernetes.io/component: runner-reaper-manual
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: daytona-runner-reaper-manual
  namespace: default # EDIT ME: namespace your Daytona release is installed in
  labels:
    app.kubernetes.io/name: daytona
    app.kubernetes.io/component: runner-reaper-manual
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: daytona-runner-reaper-manual
subjects:
  - kind: ServiceAccount
    name: daytona-runner-reaper-manual
    namespace: default # EDIT ME: namespace your Daytona release is installed in
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: daytona-runner-reaper-manual
  namespace: default # EDIT ME: namespace your Daytona release is installed in
  labels:
    app.kubernetes.io/name: daytona
    app.kubernetes.io/component: runner-reaper-manual
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: daytona
            app.kubernetes.io/component: runner-reaper-manual
        spec:
          serviceAccountName: daytona-runner-reaper-manual
          restartPolicy: Never
          volumes:
            - name: shared
              emptyDir: {}
          initContainers:
            # K8s gate: record which pods are actually alive right now. The
            # reaper container refuses to delete anything if this census is
            # missing or empty, so a census failure fails safe (no reaping).
            - name: pod-census
              image: "docker.io/alpine/kubectl:1.33.4"
              imagePullPolicy: IfNotPresent
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  kubectl get pods -n "$NAMESPACE" \
                    --field-selector=status.phase!=Failed,status.phase!=Succeeded \
                    -o custom-columns=:metadata.name --no-headers > /shared/live-pods.txt
                  echo "Census: $(wc -l < /shared/live-pods.txt) live pods in $NAMESPACE"
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: shared
                  mountPath: /shared
              resources:
                limits:
                  cpu: 100m
                  memory: 64Mi
                requests:
                  cpu: 10m
                  memory: 32Mi
          containers:
            - name: reaper
              image: "docker.io/library/postgres:17-alpine"
              imagePullPolicy: IfNotPresent
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  STALE_MIN="${STALE_AFTER_MINUTES:-5}"
                  PSQL="psql -v ON_ERROR_STOP=1 -h $DB_HOST -p $DB_PORT -U $DB_USERNAME -d $DB_DATABASE"
                  if ! [ -s /shared/live-pods.txt ]; then
                    echo "ERROR: pod census missing or empty — refusing to reap anything" >&2
                    exit 1
                  fi
                  CANDIDATES=$($PSQL -tA <<SQL
                  SELECT id::text || '|' || name FROM runner
                  WHERE (state = 'unresponsive'
                         AND "lastChecked" IS NOT NULL
                         AND "lastChecked" < now() - interval '${STALE_MIN} minutes')
                     OR (state IN ('initializing', 'unresponsive')
                         AND "lastChecked" IS NULL
                         AND "updatedAt" < now() - interval '${STALE_MIN} minutes');
                  SQL
                  )
                  if [ -z "$CANDIDATES" ]; then
                    echo "No runner rows stale >= ${STALE_MIN}m. Nothing to do."
                    exit 0
                  fi
                  REAP_IDS=""
                  for line in $CANDIDATES; do
                    id="${line%%|*}"
                    name="${line#*|}"
                    case "$id" in *[!0-9a-f-]*|"") echo "SKIP malformed id: $line"; continue;; esac
                    if grep -qxF "$name" /shared/live-pods.txt; then
                      echo "SKIP $name: backing pod still exists (node alive or still initializing)"
                    else
                      echo "REAP $name: stale in DB and no backing pod — node is gone"
                      REAP_IDS="${REAP_IDS}${REAP_IDS:+,}'$id'"
                    fi
                  done
                  if [ -z "$REAP_IDS" ]; then
                    echo "All stale rows still have live pods — nothing reaped."
                    exit 0
                  fi
                  $PSQL <<SQL
                  BEGIN;
                  -- These sandboxes lived on the deleted node; the rows are
                  -- unrecoverable and the API can never reconcile them, so
                  -- remove them outright. Child rows (sandbox_fork,
                  -- sandbox_last_activity, ssh_access) follow via ON DELETE
                  -- CASCADE. ::text on both sides keeps the comparison valid
                  -- whether "runnerId" is uuid or varchar across versions.
                  DELETE FROM sandbox WHERE "runnerId"::text IN (${REAP_IDS});
                  DELETE FROM runner WHERE id::text IN (${REAP_IDS});
                  COMMIT;
                  SQL
                  echo "Reap complete"
              env:
                - name: STALE_AFTER_MINUTES
                  value: "5"
                - name: DB_HOST
                  value: "daytona-postgresql" # EDIT ME: <helm-release-name>-postgresql
                - name: DB_PORT
                  value: "5432"
                - name: DB_DATABASE
                  value: "daytona" # matches chart default; change if you overrode postgresql.auth.database
                - name: DB_USERNAME
                  value: "user" # matches chart default; change if you overrode postgresql.auth.username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: daytona-postgresql # EDIT ME: <helm-release-name>-postgresql
                      key: password
              volumeMounts:
                - name: shared
                  mountPath: /shared
              resources:
                limits:
                  cpu: 100m
                  memory: 64Mi
                requests:
                  cpu: 10m
                  memory: 32Mi
